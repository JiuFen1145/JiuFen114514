<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JiuFen带你练习</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;color:#fff;text-align:center;padding:20px;font-family:system-ui, sans-serif}

  /* 主界面 */
  #home{display:grid;place-items:center;height:80vh;gap:30px}
  #home h1{font-size:32px;color:#fff}
  #enterGame{padding:14px 30px;font-size:18px;background:#e63946;color:#fff;border:none;border-radius:12px;cursor:pointer}

  /* 模式选择 */
  #modeSelect{display:none;place-items:center;height:80vh;gap:20px}
  #modeSelect h2{font-size:24px;margin-bottom:10px}
  .modeBtn{padding:12px 24px;font-size:16px;background:#e63946;color:#fff;border:none;border-radius:10px;width:160px}

  /* 游戏界面 */
  #gameWrapper{display:none}
  #ui{display:flex;justify-content:space-between;width:320px;margin:0 auto 10px;padding:0 4px;font-size:16px}
  #game{
    width:320px;height:500px;margin:0 auto;
    background:#111;
    border:2px solid #555;position:relative;overflow:hidden;
  }
  .track{position:absolute;top:0;left:0;width:80px;height:100%;border-right:1px solid #fff4;opacity:.8}
  .t1{left:0} .t2{left:80px} .t3{left:160px} .t4{left:240px}
  .note{
    position:absolute;width:76px;height:50px;
    background:#e63946;border:2px solid #fff;border-radius:8px;
    margin:0 2px;box-shadow:0 0 8px #e6394688
  }

  /* 结束面板 */
  #over{
    position:fixed;inset:0;background:rgba(0,0,0,0.8);
    display:none;place-items:center;font-size:22px;gap:16px;z-index:20
  }
  #over button{padding:10px 20px;background:#e63946;color:#fff;border:none;border-radius:8px}
</style>
</head>
<body>

<!-- 主界面 -->
<div id="home">
  <h1>JiuFen带你练习</h1>
  <button id="enterGame">进入游戏</button>
</div>

<!-- 模式选择 -->
<div id="modeSelect">
  <h2>选择模式</h2>
  <button class="modeBtn" data-mode="normal">普通模式（30秒）</button>
  <button class="modeBtn" data-mode="endless">无尽模式</button>
</div>

<!-- 游戏主区域 -->
<div id="gameWrapper">
  <div id="ui">
    <div>时间: <span id="timeDisplay">30.0</span>s</div>
    <div>COMBO: <span id="comboDisplay">0</span></div>
  </div>
  <div id="game">
    <div class="track t1"></div>
    <div class="track t2"></div>
    <div class="track t3"></div>
    <div class="track t4"></div>
  </div>
</div>

<!-- 结束界面 -->
<div id="over">
  <div>游戏结束</div>
  <div>最终分数: <span id="final">0</span></div>
  <div>最高COMBO: <span id="maxCombo">0</span></div>
  <button onclick="location.reload()">再来一局</button>
</div>

<script>
const game = document.getElementById('game');
const trackWidth = 80;
const gameHeight = 500;
let notes = [];
let score = 0;
let gameOver = false;

let gameMode = null;
let timeLeft = 30;
let timer = null;
let combo = 0;
let maxCombo = 0;

const home = document.getElementById('home');
const modeSelect = document.getElementById('modeSelect');
const gameWrapper = document.getElementById('gameWrapper');
const timeDisplay = document.getElementById('timeDisplay');
const comboDisplay = document.getElementById('comboDisplay');
const finalScore = document.getElementById('final');
const maxComboDisplay = document.getElementById('maxCombo');
const overPanel = document.getElementById('over');

document.getElementById('enterGame').onclick = () => {
  home.style.display = 'none';
  modeSelect.style.display = 'grid';
};

document.querySelectorAll('.modeBtn').forEach(b => {
  b.onclick = () => {
    gameMode = b.dataset.mode;
    modeSelect.style.display = 'none';
    gameWrapper.style.display = 'block';
    startGame();
  };
});

function startGame() {
  gameOver = false;
  score = 0;
  combo = 0;
  maxCombo = 0;
  notes.forEach(n => n.el.remove());
  notes = [];

  comboDisplay.textContent = '0';
  if (gameMode === 'normal') {
    timeLeft = 30;
    timeDisplay.textContent = '30.0';
    timer = setInterval(runTimer, 100);
  } else {
    timeDisplay.textContent = '∞';
  }

  update();
  spawn();
}

function runTimer() {
  if (gameOver) return;
  timeLeft -= 0.1;
  timeDisplay.textContent = timeLeft.toFixed(1);
  if (timeLeft <= 0) {
    clearInterval(timer);
    endGame();
  }
}

function update() {
  if (gameOver) return;
  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    n.y += 10;
    n.el.style.top = n.y + 'px';
    if (n.y > gameHeight) {
      combo = 0;
      comboDisplay.textContent = combo;
      n.el.remove();
      notes.splice(i, 1);
    }
  }
  requestAnimationFrame(update);
}

function spawn() {
  if (gameOver) return;
  const trackIndex = Math.floor(Math.random() * 4);
  const left = trackIndex * trackWidth;
  const el = document.createElement('div');
  el.className = 'note';
  el.style.left = left + 'px';
  el.style.top = '0px';
  game.appendChild(el);
  notes.push({ el, trackIndex, y: 0 });
  setTimeout(spawn, 180);
}

game.onclick = e => {
  if (gameOver) return;
  const rect = game.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const clickTrack = Math.floor(x / trackWidth);

  const list = notes.filter(n => n.trackIndex === clickTrack);
  if (list.length === 0) {
    endGame();
    return;
  }

  const bottomNote = list.reduce((a, b) => b.y > a.y ? b : a);
  bottomNote.el.remove();
  notes.splice(notes.indexOf(bottomNote), 1);

  score++;
  combo++;
  maxCombo = Math.max(maxCombo, combo);
  comboDisplay.textContent = combo;
};

function endGame() {
  gameOver = true;
  clearInterval(timer);
  finalScore.textContent = score;
  maxComboDisplay.textContent = maxCombo;
  overPanel.style.display = 'grid';
}
</script>
</body>
</html>
